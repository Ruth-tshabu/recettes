<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laisser un Avis - Avis Gourmands</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4a373;
            --primary-hover: #c5925e;
            --dark: #2f2519;
            --bg-gradient: linear-gradient(180deg, #fdfbf7 0%, #f5f0e6 100%);
            --text: #4a3e3d;
            --card-bg: #ffffff;
            --border: #faedcd;
            --shadow: rgba(212, 163, 115, 0.15);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(212, 163, 115, 0.12);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--dark);
            margin: 0 0 8px 0;
            text-align: center;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #2f2519, #d4a373);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #7a6e67;
            text-align: center;
            margin: 0 0 32px 0;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #dcd6cd;
            background-color: #faf9f6;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(212, 163, 115, 0.15);
        }

        textarea {
            resize: vertical;
        }

        .actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 32px;
        }

        .btn {
            padding: 12px 28px;
            font-weight: 600;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: none;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #c5925e 100%);
            color: white;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--shadow);
        }

        .btn-secondary {
            background: transparent;
            color: #7a6e67;
            border: 1px solid #dcd6cd;
        }

        .btn-secondary:hover {
            background: #faf9f6;
            color: var(--dark);
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h1>Laisser un Avis</h1>
        <p class="subtitle">Votre avis nous aide à améliorer la qualité de nos recettes</p>

        <form th:action="@{/reviews}" th:object="${review}" method="post">
            <div class="form-group">
                <label for="reviewerName">Votre Nom :</label>
                <input
                    type="text"
                    id="reviewerName"
                    th:field="*{reviewerName}"
                    placeholder="Ex: Alice Martin"
                    required
                />
            </div>

            <div class="form-group">
                <label for="recipe">Recette à évaluer :</label>
                <select id="recipe" th:field="*{recipe.id}" required>
                    <option value="" disabled selected>Choisissez une recette...</option>
                    <option th:each="rec : ${recipes}" th:value="${rec.id}" th:text="${rec.name} + ' (' + ${rec.difficulty} + ')'"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="rating">Note (de 1 à 5) :</label>
                <input
                    type="number"
                    id="rating"
                    min="1"
                    max="5"
                    th:field="*{rating}"
                    placeholder="Ex: 5"
                    required
                />
            </div>

            <div class="form-group">
                <label for="comment">Commentaire :</label>
                <textarea
                    id="comment"
                    rows="4"
                    th:field="*{comment}"
                    placeholder="Ex: Cette recette était délicieuse..."
                    required
                ></textarea>
            </div>

            <div class="actions">
                <a th:href="@{/reviews}" class="btn btn-secondary">Retour</a>
                <button type="submit" class="btn btn-primary">Soumettre l'avis</button>
            </div>
        </form>
    </div>
</body>
</html>
